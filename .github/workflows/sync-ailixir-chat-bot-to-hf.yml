name: Sync AILIXIR Chat Bot to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - "ai_apps/chem_agent_api/**"
      - ".github/workflows/sync-ailixir-chat-bot-to-hf.yml"

  workflow_dispatch:

jobs:
  sync-to-huggingface:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"

      - name: Add Gemini key to Hugging Face Space secrets
        run: |
          hf spaces secrets add shdwRow/ailixir-chat-bot \
            -s GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --token "${{ secrets.HF_TOKEN }}"

      - name: Sync chat bot service to Hugging Face Space
        uses: huggingface/hub-sync@v0.1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: shdwRow/ailixir-chat-bot
          repo_type: space
          space_sdk: docker
          subdirectory: ai_apps/chem_agent_api
          hf_token: ${{ secrets.HF_TOKEN }}
