name: AILIXIR API Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run Auth API tests
        env:
          BASE_URL: https://america-hyperlipemic-grazyna.ngrok-free.dev/api
          TEST_EMAIL: salehyasmeen080@gmail.com
          TEST_PASSWORD: 123456789
          TEST_NAME: yasmeen564
        run: |
          pytest tests/test_auth.py -v --tb=short --junitxml=junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: junit.xml

      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "junit.xml"
        if: always()
