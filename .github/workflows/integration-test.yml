name: Docker Integration Test

on:
  push:
    branches: [main, develop, 'feature/**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: docker-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  laravel-to-ai-services:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start stack
        run: |
          # Clean up volumes from previous runs
          docker compose down -v 2>/dev/null || true
          
          docker compose build --parallel
          docker compose up -d --wait
          
          # Run fresh migrations to ensure clean database state
          docker compose exec -T laravel php artisan migrate:fresh --force

      - name: Show service status
        if: always()
        run: docker compose ps -a

      - name: Wait for Laravel API
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "Laravel is up"
              exit 0
            fi
            echo "Waiting for Laravel ($i/60)..."
            sleep 5
          done
          docker compose logs laravel
          exit 1

      - name: Test aggregated AI health via Laravel
        run: |
          echo "GET /api/ai-services/health"
          curl -sf http://localhost:8080/api/ai-services/health | tee health.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("health.json"))
          if not data.get("success"):
              print("AI services health check failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("All AI services healthy via Laravel")
          PY

      - name: Test ADMET proxy via Laravel
        run: |
          echo "POST /api/ai-services/test/admet"
          curl -sf -X POST http://localhost:8080/api/ai-services/test/admet \
            -H "Content-Type: application/json" \
            -d '{"smiles":"c1ccccc1"}' | tee admet.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("admet.json"))
          if not data.get("success"):
              print("ADMET proxy test failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("ADMET proxy OK")
          PY

      - name: Test Chemical RAG proxy via Laravel
        run: |
          echo "POST /api/ai-services/test/chemical-search"
          curl -sf -X POST http://localhost:8080/api/ai-services/test/chemical-search \
            -H "Content-Type: application/json" \
            -d '{"smiles":"CCO","top_k":3}' | tee chemical.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("chemical.json"))
          if not data.get("success"):
              print("Chemical RAG proxy test failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("Chemical RAG proxy OK")
          PY

      - name: Test Drug Repurposing proxy via Laravel
        run: |
          echo "GET /api/ai-services/test/drug-repurposing"
          curl -sf http://localhost:8080/api/ai-services/test/drug-repurposing | tee drug.json
          python3 - <<'PY'
          import json, sys
          data = json.load(open("drug.json"))
          if not data.get("success"):
              print("Drug Repurposing proxy test failed:", json.dumps(data, indent=2))
              sys.exit(1)
          print("Drug Repurposing proxy OK")
          PY

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v

  docking-integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start stack
        run: |
          docker compose down -v 2>/dev/null || true
          docker compose build laravel
          docker compose up -d laravel

      - name: Verify RDKit, Vina, and Open Babel in container
        run: |
          echo "Verifying python3 import rdkit"
          docker compose exec -T laravel python3 -c "import rdkit; print(rdkit.__version__)"
          echo "Verifying vina --help"
          docker compose exec -T laravel vina --help
          echo "Verifying obabel -V"
          docker compose exec -T laravel obabel -V

      - name: Run Laravel Feature Tests
        run: |
          docker compose exec -T laravel php artisan test --filter=DockingSubmitTest

      - name: Tear down
        if: always()
        run: docker compose down -v
