[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:laravel]
command=php artisan serve --host=0.0.0.0 --port=7680
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:queue]
command=php artisan queue:work --sleep=3 --tries=3 --timeout=300
directory=/var/www/html
autostart=true
autorestart=true
startretries=3
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
