name: ailixir

services:
  # ── Laravel API ─────────────────────────────────────────────
  laravel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ailixir-laravel
    restart: unless-stopped
    ports:
      - "${LARAVEL_HTTP_PORT:-8080}:8000"
    env_file:
      - docker/laravel.env
    environment:
      DB_HOST: mysql
      CHEMICAL_AI_URL: http://chemical-rag:5000
      ADMET_AI_URL: http://admet:8000
      AI_ADMET_SERVICE_URL: http://admet:8000
      DRUG_REPURPOSING_URL: http://drug-repurposing:8000
      AI_SERVICE_URL: http://drug-repurposing:8000
      AI_INTEGRATION_ROUTES_ENABLED: "true"
    volumes:
      - laravel-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      admet:
        condition: service_healthy
      chemical-rag:
        condition: service_healthy
      drug-repurposing:
        condition: service_healthy
    networks:
      - ailixir

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ailixir-queue
    restart: unless-stopped
    env_file:
      - docker/laravel.env
    environment:
      DB_HOST: mysql
      CHEMICAL_AI_URL: http://chemical-rag:5000
      ADMET_AI_URL: http://admet:8000
      AI_ADMET_SERVICE_URL: http://admet:8000
      DRUG_REPURPOSING_URL: http://drug-repurposing:8000
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--timeout=300"]
    depends_on:
      mysql:
        condition: service_healthy
      laravel:
        condition: service_started
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:work", "--once"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ailixir

  mysql:
    image: mariadb:11.4
    container_name: ailixir-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ailixir
      MYSQL_USER: ailixir
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - ailixir
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── AI microservices ────────────────────────────────────────
  admet:
    build:
      context: ./ai_apps/ADMIT/admet_inference
      dockerfile: Dockerfile
    container_name: ailixir-admet
    restart: unless-stopped
    ports:
      - "${ADMET_HTTP_PORT:-8002}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: INFO
    networks:
      - ailixir
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 6G

  drug-repurposing:
    build:
      context: "./ai_apps/Drug Reporposing"
      dockerfile: docker/Dockerfile
    container_name: ailixir-drug-repurposing
    restart: unless-stopped
    ports:
      - "${DRUG_REPURPOSING_HTTP_PORT:-8001}:8000"
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      DEBUG: "False"
      LOG_LEVEL: INFO
      USE_MOCK_MODEL: "False"
      USE_MOCK_DRUGS: "False"
    networks:
      - ailixir
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 8G

  chemical-rag:
    build:
      context: ./ai_apps/chemical-rag-system/chemical-rag-system
      dockerfile: Dockerfile
    container_name: ailixir-chemical-rag
    restart: unless-stopped
    ports:
      - "${CHEMICAL_RAG_HTTP_PORT:-5000}:5000"
    environment:
      PYTHONUNBUFFERED: "1"
      API_PORT: "5000"
      API_HOST: 0.0.0.0
    volumes:
      - chemical-rag-data:/app/data
    networks:
      - ailixir
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    deploy:
      resources:
        limits:
          memory: 4G

networks:
  ailixir:
    driver: bridge

volumes:
  mysql-data:
  laravel-storage:
  chemical-rag-data:
