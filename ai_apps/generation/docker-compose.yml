services:
  deeppurpose:
    build:
      context: .
      dockerfile: Dockerfile.dp
    container_name: ailixir-deeppurpose
    ports:
      - "8001:8001"
    volumes:
      - ./outputs:/app/outputs
      - ./bundle:/app/bundle

  ailixir-api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        ADGPU_TARGETS: "50 52 60 61 70 75 80 86 89 90"
    container_name: ailixir-api
    depends_on:
      - deeppurpose
    ports:
      - "8000:8000"
    environment:
      PUBLIC_BASE_URL: "http://localhost:8000"
      REINVENT_DEVICE: "cpu"
      DEEPPURPOSE_URL: "http://deeppurpose:8001/reinvent_predict"
      ADGPU_BIN: "/opt/AutoDock-GPU/bin/autodock_gpu_64wi"
      LD_LIBRARY_PATH: "/usr/local/cuda/lib64:/opt/conda/envs/ailixir/lib:/opt/conda/lib:/usr/local/lib"
      LD_PRELOAD: "/opt/conda/envs/ailixir/lib/libstdc++.so.6"
      PATH: "/usr/local/cuda/bin:/opt/conda/envs/ailixir/bin:/opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    volumes:
      - ./outputs:/app/outputs
      - ./bundle:/app/bundle
    gpus: all